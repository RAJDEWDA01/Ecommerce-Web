services:
  - type: keyvalue
    name: gaumaya-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

  - type: web
    name: gaumaya-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: TRUST_PROXY
        value: "true"
      - key: UPLOAD_DRIVER
        value: cloudinary
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: gaumaya-redis
          property: connectionString
      - key: FRONTEND_URL
        value: https://gaumaya-frontend.onrender.com
      - key: CORS_ORIGIN
        value: https://gaumaya-frontend.onrender.com
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_FOLDER
        value: gaumaya-uploads
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: Gaumaya Farm <no-reply@gaumaya.local>
      - key: ADMIN_NOTIFICATION_EMAILS
        sync: false
      - key: AUDIT_ALERT_NOTIFIER_ENABLED
        value: "false"

  - type: web
    name: gaumaya-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://gaumaya-backend.onrender.com
      - key: INTERNAL_API_BASE_URL
        value: https://gaumaya-backend.onrender.com
