services:
  nginx:
    ports:
      - "${PUBLIC_HTTP_PORT:-80}:80"
      - "${PUBLIC_HTTPS_PORT:-443}:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-_}
      TLS_CERT_PATH: ${TLS_CERT_PATH:-/etc/nginx/certs/fullchain.pem}
      TLS_KEY_PATH: ${TLS_KEY_PATH:-/etc/nginx/certs/privkey.pem}
    volumes:
      - ./ops/nginx/templates/default.tls.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./ops/nginx/certs:/etc/nginx/certs:ro
