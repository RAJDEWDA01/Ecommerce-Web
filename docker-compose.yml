services:
  mongo:
    image: mongo:7
    container_name: gaumaya-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: gaumaya-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
    container_name: gaumaya-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/gaumaya
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: http://localhost:3000
      CORS_ORIGIN: http://localhost:3000
      TRUST_PROXY: "1"
    depends_on:
      mongo:
        condition: service_started
      redis:
        condition: service_started
    ports:
      - "5000:5000"
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5000/api/health/ready').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1));"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:5000
    container_name: gaumaya-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1));"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mongo_data:
  redis_data:
  backend_uploads:
